<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Chatbot na Nuvem</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background: white; width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .historico { height: 300px; overflow-y: auto; background: #eef2f3; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .mensagem { margin-bottom: 10px; padding: 8px; border-radius: 5px; word-wrap: break-word; }
        .user { background: #007bff; color: white; text-align: right; }
        .bot { background: #ddd; color: black; text-align: left; }
        input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 25%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🤖 Assistente IA</h2>
        <div class="historico" id="historico"></div>
        <div>
            <input type="text" id="pergunta" placeholder="Digite sua pergunta...">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>
        // URL DO SEU BACKEND NO RENDER
        const URL_BACKEND = "https://apiagenteia.onrender.com/api/chat";

        async function enviarMensagem() {
            const input = document.getElementById("pergunta");
            const historico = document.getElementById("historico");
            const texto = input.value;

            if(!texto) return;

            // 1. Mostra a mensagem do usuário
            historico.innerHTML += `<div class="mensagem user">${texto}</div>`;
            input.value = "";
            
            const loadingId = "loading-" + Date.now();
            historico.innerHTML += `<div class="mensagem bot" id="${loadingId}">Pensando...</div>`;
            historico.scrollTop = historico.scrollHeight;

            try {
                // 2. Faz a chamada para o servidor na nuvem
                const resposta = await fetch(URL_BACKEND, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pergunta: texto })
                });

                const dados = await resposta.json();

                // 3. Exibe a resposta ou o erro
                if (dados.resposta) {
                    document.getElementById(loadingId).innerText = dados.resposta;
                } else {
                    document.getElementById(loadingId).innerText = "Erro: " + (dados.erro || "Sem resposta");
                }

            } catch (erro) {
                document.getElementById(loadingId).innerText = "Erro de conexão com o Servidor ❌";
            }
            
            historico.scrollTop = historico.scrollHeight;
        }
    </script>
</body>
</html>
